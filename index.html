<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family: 'Georgia', serif;

    background:
    radial-gradient(circle at top, rgba(255,255,255,0.18), transparent 40%),
    linear-gradient(
        180deg,
        #08111f 0%,
        #0f2740 35%,
        #173b61 65%,
        #0a1624 100%
    );

    color:white;
}

.container{
    text-align:center;
    z-index:2;
    padding:20px;
}

h1{
    font-size:3rem;
    font-weight:300;
    max-width:900px;
    line-height:1.4;
    margin-bottom:70px;
    text-shadow:0 0 20px rgba(255,255,255,0.2);
}

a{
    text-decoration:none;
}

button{
    padding:18px 42px;
    font-size:1.15rem;
    border:none;
    border-radius:50px;

    background:rgba(255,255,255,0.08);

    color:white;

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.15);

    cursor:pointer;

    transition:0.4s;
}

button:hover{
    transform:translateY(-4px);
    box-shadow:
    0 0 25px rgba(173,216,230,0.35),
    0 0 45px rgba(255,255,255,0.15);

    background:rgba(255,255,255,0.12);
}

.snowflake{
    position:absolute;
    color:white;
    opacity:0.4;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
    }

    to{
        transform:translateY(110vh);
    }
}

</style>
</head>

<body>

<div class="snowflake" style="left:10%; top:-50px; animation-duration:12s;">❄</div>
<div class="snowflake" style="left:25%; top:-150px; animation-duration:18s;">❅</div>
<div class="snowflake" style="left:40%; top:-80px; animation-duration:15s;">❄</div>
<div class="snowflake" style="left:60%; top:-120px; animation-duration:20s;">❅</div>
<div class="snowflake" style="left:75%; top:-50px; animation-duration:14s;">❄</div>
<div class="snowflake" style="left:90%; top:-100px; animation-duration:17s;">❅</div>

<div class="container">

    <h1>
        Some people arrive quietly<br>
        and change the season.
    </h1>

    <a href="carta.html">
        <button>
            Tourner la première page ✨
        </button>
    </a>

</div>

</body>
</html>
